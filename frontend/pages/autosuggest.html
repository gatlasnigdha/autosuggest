<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>document</title>
 <link rel="stylesheet" href="beinginfinity.css">
</head>
<body>
    <div id="top">
    <span class="setting">&#9881;</span>
    <span class="online">&#X2022; ONLINE | &#x1F552; - ms</span>
</div>
    
        <div class="main">
            <h1><span class="being">Being</span><span class="infinity">Infinity</span></h1>
            <p class="p1">One million phrases.Four algorithms.Prefix Based Auto Suggest.</p>
         <span> <span class="lens">&#128269;</span><input 
            id="search"
            class ="search" placeholder=" Start typing to search phrases"></span>
        </div>
    <div id="suggest-box"></div>
    <script>
        var searchBox=document.getElementById("search");
        var suggestionBox=document.getElementById("suggest-box");
        searchBox.addEventListener("input",function(){
            //get user typed text
            var userInput=searchBox.value;
            if(userInput.trim()===""){
             suggestionBox.innerHTML = "";
               return;
            }
            else{
                var url1= "https://autosuggest-backend.onrender.com/api/autosuggest?q=";
                var url2="&algorithm=brute&limit=10&weighted=false";
                var url=url1+userInput+url2;
                fetch(url) .then(function(response){
                    return response.json();
                })
            .then(function(data){       // View complete response
                console.log(data);
                var resultsArray=data.results;
                var htmlResults="";
                for(var i=0;i<resultsArray.length;i++){
                    htmlResults += "<div class='suggest-text'>" + resultsArray[i].text + "</div>";
                }
                suggestionBox.innerHTML=htmlResults;
            })
            //make api call to get suggestions
            //display results in html
        }
        });
    
    </script>
</body>
</html>
